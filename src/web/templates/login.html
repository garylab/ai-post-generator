<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · AI Post Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { bg: '#0f1115', panel: '#161a22', border: '#242a36', muted: '#8a93a6' } } }
    }
  </script>
</head>
<body class="bg-bg text-slate-100 font-sans text-sm antialiased min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <h1 class="text-xl font-semibold">AI Post Generator</h1>
      <p class="text-muted text-xs mt-1">Sign in to continue</p>
    </div>

    {% if error %}
    <div class="mb-4 px-3 py-2 rounded-md bg-rose-900/40 text-rose-300 text-sm border border-rose-800/50">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="bg-panel border border-border rounded-lg p-6 space-y-4">
      {% set inp = "bg-bg border border-border rounded-md px-3 py-2 text-slate-100 w-full focus:outline-none focus:ring-1 focus:ring-sky-500" %}
      <label class="block">
        <span class="text-xs text-muted">Email</span>
        <input type="email" name="email" value="{{ email or '' }}" required autofocus class="{{ inp }} mt-1">
      </label>
      <label class="block">
        <span class="text-xs text-muted">Password</span>
        <input type="password" name="password" required class="{{ inp }} mt-1">
      </label>
      <button class="w-full bg-sky-500 hover:bg-sky-400 text-slate-900 font-medium rounded-md px-3 py-2">
        Sign in
      </button>
    </form>
  </div>
</body>
</html>
